version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  dev:
    desc: Start Vite dev server
    cmds:
      - deno task dev

  dev:open:
    desc: Start dev server and open in browser
    cmds:
      - deno task dev -- --open

  build:
    desc: Production build
    cmds:
      - deno task build

  preview:
    desc: Preview the production build
    cmds:
      - deno task preview

  check:
    desc: Type-check the project with svelte-check
    cmds:
      - deno task check

  check:watch:
    desc: Type-check in watch mode
    cmds:
      - deno task check:watch

  format:
    desc: Format files with Prettier
    cmds:
      - deno task format

  lint:
    desc: Check formatting with Prettier
    cmds:
      - deno task lint

  sync:
    desc: Regenerate .svelte-kit types
    cmds:
      - deno run -A npm:svelte-kit sync

  clean:
    desc: Remove build artifacts and dependencies
    cmds:
      - rm -rf .svelte-kit build dist node_modules

  reinstall:
    desc: Clean and reinstall dependencies
    cmds:
      - task: clean
      - deno install


  playwright:cli:check:
      desc: Verify the Playwright CLI (@playwright/cli) and Chromium are reachable
      cmds:
        - echo -e "{{.CYAN}}Checking Playwright CLI...{{.NC}}"
        - npx -y @playwright/cli@latest --help > /dev/null 2>&1 && echo -e "{{.GREEN}}OK — Playwright CLI is installable.{{.NC}}" || (echo -e "{{.YELLOW}}First run will install it via npx -y; that's fine.{{.NC}}" && exit 0)
        - npx playwright install chromium --dry-run > /dev/null 2>&1 && echo -e "{{.GREEN}}OK — Chromium browser binary present.{{.NC}}" || echo -e "{{.YELLOW}}Run 'npx playwright install chromium' if the CLI can't find a browser.{{.NC}}"
